<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Box Model Activity</title>

    <style>
        /* First box */

        .example1 {

            width: 220px;

            background-color: yellow;

            padding: 0px;

            border: 0px;

            margin: 0px;

        }

        /* Second box */

        .example2 {

            width: 220px;

            background-color: green;

            padding: 50px;

            border: 5px solid black;

            margin: 40px 20px;

            color: white;

        }

        hr {

            background-color: red;

            height: 2px;

            border: none;

        }
    </style>

</head>

<body>

    <h1>Box Model Example</h1>

    <hr>

    <p class="example1">My Content Example 1</p>

    <hr style="width:100%; height:10px; background-color:blue;">

    <p class="example2">My Content Example 2</p>

    <hr style="width:100%; height:5px; background-color:red;">

</body>

</html>
